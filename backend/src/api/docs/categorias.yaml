# src/api/docs/categorias.yaml
paths:
  /api/locales/{localId}/categorias:
    get:
      tags: [Categorías]
      summary: Listar categorías del menú
      description: "🟢 Público — La tablet usa esto para el carrusel de categorías."
      parameters:
        - name: localId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200:
          description: Categorías ordenadas por campo "orden"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Categoria'

    post:
      tags: [Categorías]
      summary: Crear categoría
      security:
        - bearerAuth: []
      parameters:
        - name: localId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre]
              properties:
                nombre: { type: string, example: "Tacos" }
                orden: { type: integer, default: 0, example: 1 }
      responses:
        201:
          description: Categoría creada

  /api/locales/{localId}/categorias/{id}:
    patch:
      tags: [Categorías]
      summary: Editar categoría
      security:
        - bearerAuth: []
      parameters:
        - name: localId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre: { type: string }
                orden: { type: integer }
      responses:
        200:
          description: Categoría actualizada

    delete:
      tags: [Categorías]
      summary: Eliminar categoría
      description: "🔴 Solo dueño. Falla si tiene productos vinculados."
      security:
        - bearerAuth: []
      parameters:
        - name: localId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200:
          description: Categoría eliminada
        400:
          description: Tiene productos vinculados

components:
  schemas:
    Categoria:
      type: object
      properties:
        id: { type: string, format: uuid }
        localId: { type: string, format: uuid }
        nombre: { type: string, example: "Tacos" }
        orden: { type: integer, example: 1 }
